    function getGrupoElementsConfiguracao(grupoElement) {

        var grupoId = grupoElement.u_gruporelstamp

                var valordinamico = celula.valordinamico ? celula.valordinamico : "[]"

    function buildFilters(filters) {

        var filterResult = "AND 1=1"

        filters.forEach(filter => {

            filterResult += (["Todas", "Todos"].indexOf(filter?.filtervalue) >= 0 ? " AND 1=1 " : " AND " + filter.filterkey + "='" + filter.filtervalue + "' ")

        })

        return filterResult

    }

    function buildFiltersRelatorios(filters) {

        var filterResult = "AND 1=1"

        filters.forEach(filter => {

            var filterkey = filter.filterkey

            if (filter.filterkey == "cct") {
                var selectedOption = $('#empresaSelect').find(':selected');
                var dataNumero = selectedOption.data('numero');
                filterkey = "noempresa"
                filterResult += (["Todas", "Todos"].indexOf(filter?.filtervalue) >= 0 ? " AND 1=1 " : " AND " + filterkey + "='" + dataNumero + "' ")
            }

        })

        return filterResult

    }

    function getReportConfigByCodigo(relatorio) {
        var dadosRelatorio = getDadosRelatorioSync(relatorio);
        var configuracaoRelatorio = dadosRelatorio.data.dadosRelatorio[0];

        if (dadosRelatorio.cod != "0000") {
            throw new Error("Erro ao trazer dados do relatorio");
        }

        var dadosListagem = getListagemSync(configuracaoRelatorio.syncstamp);

        if (dadosListagem.cod != "0000") {
            throw new Error("Erro ao trazer dados da listagem");
        }

        var colunas = _.uniqBy(dadosListagem.data, function (v) {
            return [v.codigocoluna, v.u_colunarelstamp, v.u_colunarelstamp].join();
        });

        var linhas = _.uniqBy(dadosListagem.data, function (v) {
            return [v.u_linhastamp, v.ordemlinha].join();
        });

        linhas.sort(function (a, b) { return a.ordemlinha - b.ordemlinha; });
        colunas.sort(function (a, b) { return a.ordemcoluna - b.ordemcoluna; });

        var variaveisFontePreenchida = [];
        var variaveisFonte = dadosRelatorio.data.variaveisFonte;

        variaveisFonte.forEach(function (variavelFonte) {
            var fonte = variavelFonte.fonte;
            var variaveisPreenchidas = [];

            variavelFonte.variaveis.forEach(function (dadosVariavel) {
                variaveisPreenchidas.push({
                    original: dadosVariavel.original,
                    preenchida: eval(dadosVariavel.nome)
                });
            });

            variaveisFontePreenchida.push({ fonte: fonte, variaveis: variaveisPreenchidas });
        });

        var fonteResult = getFonteResultSync(variaveisFontePreenchida);

        if (fonteResult.cod != "0000") {
            throw new Error("Erro ao trazer dados da fonte de dados");
        }

        fonteResult.data = fonteResult.data.map(fr => {
            dadosListagem.data.map(dl => {
                dl.valor = dl.valor.replace(fr.fonte, fr.fonte + "_REF");
                dl.valor1 = dl.valor1.replace(fr.fonte, fr.fonte + "_REF");
                dl.valorcelula = dl.valorcelula.replace(fr.fonte, fr.fonte + "_REF");
                return dl;
            });
            fr.fonte = fr.fonte + "_REF";
            return fr;
        });

        buildLocalDatabaseTablesSync(fonteResult.data);

        return {
            configuracaoRelatorio: configuracaoRelatorio,
            dadosListagem: dadosListagem.data,
            grupos: dadosListagem.grupos,
            colunas: colunas,
            linhas: linhas
        };
    }

    function paginateContentKPi() {
        // Definir o número de itens por página
        var itensPorPagina = 20;
        //1366x768
        // Obter todas as linhas da tabela, excluindo a primeira linha do cabeçalho
        var linhas = $('#impressaoTable tbody tr')

        // Calcular o número de páginas necessárias
        var numPaginas = Math.ceil(linhas.length / itensPorPagina);
        var reportCabecalho = $(".header-print-section").html()
        var reportFooter = $(".footer-print-section").html()
        // Dividir as linhas em páginas e adicionar à div de paginacao
        for (var i = 0; i < numPaginas; i++) {
            var pageNumber = i + 1
            var pageId = "page" + pageNumber
            var pagina = $('<div   id=' + pageId + ' class= "page container-kpi" ></div > ');
            var tabela = $('<table class="table print-table"></table>');
            var mainbody = $('<table class="mainbody"></table>');
            var cabecalho = $('#impressaoTable thead').clone();
            //console.log("THEAD CLONED")
            var rodape = $('<tfoot></tfoot>');

            // Adicionar cabeçalho à tabela
            tabela.append(cabecalho);

            // Adicionar linhas à tabela
            linhas.slice(i * itensPorPagina, (i + 1) * itensPorPagina).each(function () {
                if ($(this) != undefined) {

                    tabela.append($(this).clone());
                }
            });

            // Adicionar rodapé à tabela
            tabela.append(rodape);

            // pagina.append(reportCabecalho);
            pagina.append("<div class='header-print-section header-cont' >" + reportCabecalho + "</div>");

            mainbody.append(tabela)
            pagina.append(mainbody);
            pagina.append("<div style='align-self:flex-end;width:100%' class='footer-print-section footer-cont' >" + reportFooter + "</div>");
            $('#paginationContainer').append(pagina);
            $(".print-table").css("margin-top", "1em")

            var descritivoPagina = "Página " + pageNumber + " de " + numPaginas
            $("#" + pageId + " .page-number").text(descritivoPagina)

            var screenWidth = $(window).width();
            var screenHeight = $(window).height();
            //  alert(screenWidth + " " + screenHeight)
            console.log("Screen width: " + screenWidth);
            var minHeight = '0'
            if (screenHeight >= 937) {
                minHeight = "77vh"
            }

            if (screenHeight <= 625) {
                minHeight = "117vh"
            }

            if (screenHeight <= 415) {
                minHeight = "87vh"
            }


            //            //    minHeight: "117vh"
            console.log("Screen height: " + screenHeight);
            $('.page').css({
                //  position: 'relative',

            });
            // style="border-top: 1px solid black;"
            /*   $('.page .footer-print-section').css({
                   position: 'absolute',
                   bottom: '0',
                   width: '100%',
                   "text-align": "center",
                   "border-top": "1px solid black",
                   padding: "8px",
                   height: '70px'
               });*/

            $('.page').each(function () {
                if ($(this).is(':empty')) {
                    $(this).remove();
                }
            });
            $("#paginationContainer").show()



        }
    }

</script>
