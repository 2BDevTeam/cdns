    function getReportConfigByCodigo(relatorio) {
        var dadosRelatorio = getDadosRelatorioSync(relatorio);
        var configuracaoRelatorio = dadosRelatorio.data.dadosRelatorio[0];

        if (dadosRelatorio.cod != "0000") {
            throw new Error("Erro ao trazer dados do relatorio", response)
            return false
        }

        var dadosListagem = getListagemSync(configuracaoRelatorio.syncstamp);

        if (dadosListagem.cod != "0000") {
            throw new Error("Erro ao trazer dados da listagem", dadosListagem)
            return false
        }

        var colunas = _.uniqBy(dadosListagem.data, function (v) {
            return [v.codigocoluna, v.u_colunarelstamp, v.u_colunarelstamp].join();
        });

        var linhas = _.uniqBy(dadosListagem.data, function (v) {
            return [v.u_linhastamp, v.ordemlinha].join();
        });

        linhas.sort(function (a, b) {
            return a.ordemlinha - b.ordemlinha
        });

        colunas.sort(function (a, b) {
            return a.ordemcoluna - b.ordemcoluna
        });

        var variaveisFontePreenchida = []
        var variaveisFonte = dadosRelatorio.data.variaveisFonte

        variaveisFonte.forEach(function (variavelFonte) {
            var variaveis = []
            var fonte = variavelFonte.fonte
            variaveis = variavelFonte.variaveis
            var variaveisPreenchidas = []

            variaveis.forEach(function (dadosVariavel) {
                variaveisPreenchidas.push({
                    original: dadosVariavel.original,
                    preenchida: eval(dadosVariavel.nome)
                })
            })

            variaveiPublicas.forEach(function (variavelPublica) {
                variaveisPreenchidas.push({
                    original: variavelPublica.original,
                    preenchida: eval(variavelPublica.preenchida)
                })
            })

            variaveisFontePreenchida.push({
                fonte: fonte,
                variaveis: variaveisPreenchidas
            })
        })

        var fonteResult = getFonteResultSync(variaveisFontePreenchida)

        if (fonteResult.cod != "0000") {
            throw new Error("Erro ao trazer dados da fonte de dados", fonteResult)
        }

        fonteResult.data = fonteResult.data.map(fr => {
            dadosListagem.data.map(dl => {
                dl.valor = dl.valor.replace(fr.fonte, fr.fonte + "_REF");
                dl.valor1 = dl.valor1.replace(fr.fonte, fr.fonte + "_REF");
                dl.valorcelula = dl.valorcelula.replace(fr.fonte, fr.fonte + "_REF");
                return dl;
            });

            fr.fonte = fr.fonte + "_REF";
            return fr;
        });

        buildLocalDatabaseTablesSync(fonteResult.data)

        return {
            configuracaoRelatorio: configuracaoRelatorio,
            dadosListagem: dadosListagem.data,
            grupos: dadosListagem.grupos,
            colunas: colunas,
            linhas: linhas
        }
    }

    function buildLocalDatabaseTablesSync(data) {
        if (!localDataBaseExists("relatorioDb")) {
            alasql('CREATE DATABASE relatorioDb; USE relatorioDb;');
        }
        for (const fonte of data) {
            var codigoFonte = fonte.fonte
            if (localTableExists("relatorioDb", codigoFonte) == true) {
                alasql(`DROP TABLE ${codigoFonte};`);
            }

            try {
                alasql(`DROP TABLE ${codigoFonte};`);
            } catch (error) { }

            if (fonte.resultados.length > 0) {
                var dadosSchema = fonte.resultados[0]
                var resultados = fonte.resultados
                const typeMap = {
                    number: 'NUMERIC',
                    string: 'VARCHAR(max)',
                    boolean: "BIT",
                };

                const tableSchema = Object.entries(dadosSchema)
                    .map(([key, value]) => `${key} ${typeMap[typeof value]}`)
                    .join(', ');

                if (localTableExists("relatorioDb", codigoFonte) != true) {
                    const createTableQuery = `CREATE TABLE ${codigoFonte} (${tableSchema});`;
                    alasql(createTableQuery);
                }

                const batchInsertData = [];
                alasql.tables[codigoFonte].data = resultados;
            }
        }
    }

    function getCelulaReferencedByAnother(sourceCelula, codigocoluna, confRelatorio, dadosColunas) {
        var celula = _.find(confRelatorio, function (o) {
            return o.valorcelula == sourceCelula
        });

        var linhastamp = "";
        var colunastamp = "";

        if (!celula) {
            console.log("CELULA REFERENCIADA BY ANOTHER NOT FOUND", sourceCelula)
            return
        }

        var coluna = dadosColunas.find(function (col) {
            return col.codigocoluna == codigocoluna
        });

        if (!coluna) {
            console.log("Colunas existentes", dadosColunas)
            console.log("COLUNA REFERENCIADA NOT FOUND", codigocoluna)
            return;
        }

        linhastamp = celula.u_linhastamp;
        colunastamp = coluna.u_colunarelstamp;

        var celulaEncontrada = _.find(confRelatorio, function (o) {
            return o.u_linhastamp == linhastamp && o.u_colunarelstamp == colunastamp
        });

        return celulaEncontrada;
    }

    function calcularValorCelula(confRelatorio, celulaId) {
        try {
            var celula = _.find(confRelatorio, function (o) {
                return o.u_celulastamp == celulaId
            });

            if (!celula) {
                console.warn("Célula não encontrada:", celulaId);
                return "0";
            }

            var celulaValue = getCelulaValue(celula);
            var valorDinamicoResult = getValorDinamicoCelula(celula, confRelatorio);
            var valorDinamico = 0;
            var valor = 0;

            if (celulaValue && celulaValue.erro != true && celulaValue.unformatted) {
                var parsedValue = Number(celulaValue.unformatted);
                if (!isNaN(parsedValue) && isFinite(parsedValue)) {
                    valor = parsedValue;
                }
            }

            if (valorDinamicoResult && valorDinamicoResult.erro != true && valorDinamicoResult.unformatted) {
                var parsedDynamic = Number(valorDinamicoResult.unformatted);
                if (!isNaN(parsedDynamic) && isFinite(parsedDynamic)) {
                    valorDinamico = parsedDynamic;
                }
            }

            var resultado = valor + valorDinamico;
            return (!isNaN(resultado) && isFinite(resultado)) ? resultado.toString() : "0";
        } catch (error) {
            console.error("Erro em calcularValorCelula:", error, "celulaId:", celulaId);
            return "0";
        }
    }

    function getValorDinamicoCelula(celula, confRelatorio) {
        var result = 0;
        var expressao = ""

        try {
            if (celula.valordinamico && celula.valordinamico != "") {
                var dadosValoresDinamicos = JSON.parse(celula.valordinamico);

                dadosValoresDinamicos.forEach(function (valorDinamico) {
                    switch (valorDinamico.tipo) {
                        case "Standard":
                            var valorStd = valorDinamico.valor;
                            if (valorStd && valorStd.trim() !== "") {
                                expressao += valorStd;
                            }
                            break;

                        case "Celula":
                            var valorCelula = calcularValorCelula(confRelatorio, valorDinamico.valor);
                            if (valorCelula && !isNaN(valorCelula) && valorCelula !== "NaN") {
                                expressao += valorCelula;
                            } else {
                                expressao += "0";
                            }
                            break;
                    }
                });

                if (expressao != "" && expressao != undefined) {
                    var result = eval(expressao);
                    if (isNaN(result) || !isFinite(result)) {
                        result = 0;
                    }
                }
            }

            return { erro: false, unformatted: parseFloat(result).toFixed(2), valor: formatInputValue(parseFloat(result).toFixed(2)) }
        } catch (error) {
            console.error("Erro em getValorDinamicoCelula:", error, "celula:", celula);
            return { erro: true, unformatted: 0, valor: "0" }
        }
    }

                jsPDF: { unit: 'in', format: format, orientation: 'landscape' },
                pagebreak: { mode: 'avoid-all', after: '.page' },
            };

            var worker = html2pdf().from(document.getElementById('paginationContainer')).set(opt).save().then(function () {
                console.log('PDF saved successfully');
                window.location.reload()
            }).catch(function (error) {
                alertify.error("Erro ao tentar fazer descarregar o ficheiro", 9000)
            });;
        })

        $(document).off("click", "#downloadImpressaoExcel").on("click", "#downloadImpressaoExcel", function () {
            formatarImpressaoParaExcel()
            var containerDiv = document.getElementById("impressaoTable");
            var htmlContent = "<table>" + containerDiv.innerHTML + "</table>";
            htmlContent += "<br> <div><img style='margin-left:-1em' src='http://tecnica.2business-si.com:85/tecnica/IGEPE/intranet/pimages/demo_logomaisritmop.png' height='0' width='93'  alt='sample image' /></div>"

            footerElement = document.getElementsByClassName("footer-print-section");
            htmlContent += "<br>" + $(".footer-print-section").html();

            var base64Content = btoa(unescape(encodeURIComponent(htmlContent)));
            var params = new URLSearchParams(document.location.search);
            var nota = params.get("nota");

            var a = document.createElement("a");
            a.href = "data:application/vnd.ms-excel;base64," + base64Content;
            a.download = nota + (Math.floor(Math.random() * 9000) + 1000) + ".xls";
            a.click();
        })

        $(document).off("click", "#previsaoImpressao").on("click", "#previsaoImpressao", function () {
            var opt = {
                margin: [0.2, 0.2, 0.1, 0.2],
                html2canvas: {
                    scale: 1.8,
                    logging: false,
                    useCORS: true,
                    allowTaint: true
                },
                jsPDF: {
                    unit: 'in',
                    format: 'a4',
                    orientation: 'landscape',
                    putOnlyUsedFonts: true
                },
                pagebreak: {
                    mode: ['avoid-all', 'css', 'legacy'],
                    before: '.page-break-before',
                    after: '.page-break-after',
                    avoid: '.avoid-break'
                }
            };
            paginateContentKPi()

            var worker = html2pdf().set(opt).from(document.getElementById('paginationContainer')).toPdf();

            worker.output('datauristring').then(function (pdfAsString) {
                var win = window.open();
                win.document.write('<iframe src="' + pdfAsString + '" frameborder="0" style="width:100%; height:100%;" allowfullscreen></iframe>');
                window.location.reload()
            }).catch(function (error) {
                alertify.error("Erro ao tentar fazer pré visualizar  o ficheiro", 9000)
            });
        })
    }
    function paginateContentKPi() {
        $('#paginationContainer').empty();

        var itensPorPagina = 18; // Teste valores menores
        var linhas = $('#impressaoTable tbody tr');
        var numPaginas = Math.ceil(linhas.length / itensPorPagina);
        var reportCabecalho = $(".header-print-section").html();
        var reportFooter = $(".footer-print-section").html();

        console.log("numPaginas", numPaginas)
        for (var i = 0; i < numPaginas; i++) {
            var pageNumber = i + 1;
            var pageId = "page" + pageNumber;
            var pagina = $('<div class="page" id="' + pageId + '"></div>');
            var tabela = $('<table class="table print-table"></table>');
            var cabecalho = $('#impressaoTable thead').clone();
            var rodape = $('<tfoot></tfoot>');

            tabela.append(cabecalho);
            linhas.slice(i * itensPorPagina, (i + 1) * itensPorPagina).each(function () {
                tabela.append($(this).clone());
            });
            tabela.append(rodape);

            pagina.append("<div class='header-print-section'>" + reportCabecalho + "</div>");
            pagina.append(tabela);
            pagina.append("<div class='footer-print-section'>" + reportFooter + "</div>");
            $('#paginationContainer').append(pagina);

            $("#" + pageId + " .page-number").text("Página " + pageNumber + " de " + numPaginas);
            $('#paginationContainer .page').last().css('page-break-after', 'auto');
        }

        // CSS para evitar quebras e páginas em branco
        $('.page').css({
            position: 'relative'
            // minHeight: "765px", // Remova ou ajuste conforme necessário
        });
        $('.page .footer-print-section').css({
            position: 'absolute',
            /*bottom: '0',*/
            width: '100%',
            "text-align": "center",
            "border-top": "1px solid black",
            /*padding: "35px"*/
        });

        $("#paginationContainer").show();
    }
</script>
