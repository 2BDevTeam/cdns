<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDash 2.0 - Table Filters Demo</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap3.min.css">
    <style>
        body {
            padding: 20px;
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        .demo-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
            overflow: hidden;
        }
        
        .demo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
        }
        
        .demo-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }
        
        .demo-subtitle {
            font-size: 13px;
            opacity: .9;
            margin-top: 2px;
        }
        
        .demo-search {
            position: relative;
            width: 280px;
        }
        
        .demo-search input {
            width: 100%;
            padding: 8px 36px 8px 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            background: rgba(255,255,255,.2);
            color: #fff;
            transition: all .2s;
        }
        
        .demo-search input::placeholder {
            color: rgba(255,255,255,.7);
        }
        
        .demo-search input:focus {
            outline: none;
            background: rgba(255,255,255,.3);
            box-shadow: 0 0 0 3px rgba(255,255,255,.1);
        }
        
        .demo-search .glyphicon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,.8);
            pointer-events: none;
        }
        
        /* Filtros - Replicando o mockup */
        .mtbl-filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 1px solid rgba(0,0,0,.08);
        }
        
        .mtbl-filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            background: #fff;
            border: 1.5px solid rgba(0,0,0,.12);
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            user-select: none;
        }
        
        .mtbl-filter-btn:hover {
            background: #f1f5f9;
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(37,99,235,.15);
        }
        
        .mtbl-filter-btn.is-active {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(37,99,235,.25);
        }
        
        .mtbl-filter-btn.is-active:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }
        
        .mtbl-filter-btn.urgente.is-active {
            background: #dc2626;
            border-color: #dc2626;
        }
        
        .mtbl-filter-btn.urgente.is-active:hover {
            background: #b91c1c;
            border-color: #b91c1c;
        }
        
        .mtbl-filter-badge {
            display: inline-block;
            min-width: 22px;
            height: 22px;
            padding: 0 7px;
            font-size: 11px;
            font-weight: 700;
            line-height: 22px;
            text-align: center;
            background: rgba(0,0,0,.12);
            color: inherit;
            border-radius: 11px;
        }
        
        .mtbl-filter-btn.is-active .mtbl-filter-badge {
            background: rgba(255,255,255,.25);
            color: #fff;
        }
        
        /* Tabela */
        .table-container {
            padding: 24px;
        }
        
        #aprovacoes-table {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,.08);
        }
        
        /* Customização Tabulator */
        .tabulator .tabulator-header {
            background: #1e293b;
            color: #f8fafc;
            font-weight: 600;
        }
        
        .tabulator .tabulator-header .tabulator-col {
            border-right: 1px solid rgba(248,250,252,.1);
        }
        
        .tabulator-row {
            transition: background-color .15s;
        }
        
        .tabulator-row:hover {
            background: rgba(37,99,235,.04) !important;
        }
        
        .tabulator-row.tabulator-row-even {
            background: #f8fafc;
        }
        
        /* Status badges */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            letter-spacing: .3px;
        }
        
        .status-badge.normal {
            background: #10b981;
            color: #fff;
        }
        
        .status-badge.urgente {
            background: #dc2626;
            color: #fff;
        }
        
        /* Action buttons */
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid rgba(0,0,0,.12);
            border-radius: 6px;
            background: #fff;
            color: #64748b;
            cursor: pointer;
            transition: all .15s;
        }
        
        .action-btn:hover {
            background: #f1f5f9;
            border-color: #2563eb;
            color: #2563eb;
        }
        
        .action-btn.success {
            background: #10b981;
            border-color: #10b981;
            color: #fff;
        }
        
        .action-btn.success:hover {
            background: #059669;
            border-color: #059669;
        }
        
        .action-btn.danger {
            background: #dc2626;
            border-color: #dc2626;
            color: #fff;
        }
        
        .action-btn.danger:hover {
            background: #b91c1c;
            border-color: #b91c1c;
        }
        
        .action-btn.info {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }
        
        .action-btn.info:hover {
            background: #2563eb;
            border-color: #2563eb;
        }
        
        /* Config panel */
        .config-panel {
            position: fixed;
            right: 20px;
            top: 20px;
            width: 320px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .config-title {
            font-size: 14px;
            font-weight: 700;
            margin: 0 0 16px 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .config-section {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0,0,0,.06);
        }
        
        .config-section:last-child {
            border-bottom: none;
        }
        
        .config-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }
        
        .config-code {
            background: #f1f5f9;
            border: 1px solid rgba(0,0,0,.06);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #1e293b;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .btn-toggle {
            display: inline-block;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #2563eb;
            border-radius: 6px;
            background: #fff;
            color: #2563eb;
            cursor: pointer;
            transition: all .15s;
        }
        
        .btn-toggle:hover {
            background: #2563eb;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-header">
            <div>
                <h1 class="demo-title">Aprovações Pendentes</h1>
                <p class="demo-subtitle">Sistema de Filtros MDash 2.0 - Demo</p>
            </div>
            <div class="demo-search">
                <input type="text" id="global-search" placeholder="Pesquisar...">
                <span class="glyphicon glyphicon-search"></span>
            </div>
        </div>
        
        <div class="mtbl-filters-bar">
            <button class="mtbl-filter-btn is-active" data-filter="todos">
                <span class="glyphicon glyphicon-th"></span>
                Todos
                <span class="mtbl-filter-badge">5</span>
            </button>
            <button class="mtbl-filter-btn urgente" data-filter="urgentes">
                <span class="glyphicon glyphicon-alert"></span>
                Urgentes
                <span class="mtbl-filter-badge">1</span>
            </button>
            <button class="mtbl-filter-btn" data-filter="hoje">
                <span class="glyphicon glyphicon-calendar"></span>
                Hoje
                <span class="mtbl-filter-badge">2</span>
            </button>
            <button class="mtbl-filter-btn" data-filter="esta_semana">
                <span class="glyphicon glyphicon-time"></span>
                Esta Semana
                <span class="mtbl-filter-badge">4</span>
            </button>
        </div>
        
        <div class="table-container">
            <div id="aprovacoes-table"></div>
        </div>
    </div>
    
    <div class="config-panel">
        <h3 class="config-title">
            <span class="glyphicon glyphicon-cog"></span>
            Configuração
        </h3>
        
        <div class="config-section">
            <div class="config-label">Filtro Ativo</div>
            <div id="active-filter" style="font-weight:700;color:#2563eb;font-size:14px;">Todos</div>
        </div>
        
        <div class="config-section">
            <div class="config-label">Dados Filtrados</div>
            <div id="filtered-count" style="font-size:24px;font-weight:700;color:#1e293b;">5</div>
            <div style="font-size:11px;color:#64748b;">de <span id="total-count">5</span> registos</div>
        </div>
        
        <div class="config-section">
            <div class="config-label">Config JSON</div>
            <button class="btn-toggle" onclick="toggleConfig()">Ver Config</button>
            <pre id="config-json" class="config-code" style="display:none;margin-top:12px;"></pre>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <script>
        // ─── DADOS DE EXEMPLO ────────────────────────────────────────────────
        
        var dadosCompletos = [
            {
                tipo: 'dossier',
                tipoIcon: '📁',
                colaborador: 'Ana M.',
                referencia: 'Relatório X',
                submetido: '2026-05-18',
                status: 'Normal',
                acoes: ''
            },
            {
                tipo: 'ferias',
                tipoIcon: '🌴',
                colaborador: 'Carlos J.',
                referencia: '10—15 Maio',
                submetido: '2026-05-17',
                status: 'Normal',
                acoes: ''
            },
            {
                tipo: 'requisicao',
                tipoIcon: '📋',
                colaborador: 'Pedro R.',
                referencia: 'Requisição 123',
                submetido: '2026-05-16',
                status: 'Urgente',
                acoes: ''
            },
            {
                tipo: 'pagamento',
                tipoIcon: '💰',
                colaborador: 'Sofia L.',
                referencia: 'Pedido Pagto 567',
                submetido: '2026-05-15',
                status: 'Normal',
                acoes: ''
            },
            {
                tipo: 'compra',
                tipoIcon: '🛒',
                colaborador: 'Miguel S.',
                referencia: 'Ordem Compra 890',
                submetido: '2026-05-14',
                status: 'Normal',
                acoes: ''
            }
        ];
        
        // ─── CONFIGURAÇÃO DOS FILTROS ────────────────────────────────────────
        
        var filterConfig = {
            enabled: true,
            position: 'top',
            activeFilterKey: 'todos',
            definitions: [
                {
                    key: 'todos',
                    label: 'Todos',
                    type: 'button',
                    default: true,
                    badge: { enabled: true, format: '{count}' },
                    conditions: [{ field: null, operator: null, value: null }]
                },
                {
                    key: 'urgentes',
                    label: 'Urgentes',
                    type: 'button',
                    badge: { enabled: true, field: 'status', value: 'Urgente', format: '{count}' },
                    conditions: [
                        { field: 'status', operator: 'eq', value: 'Urgente', logic: 'AND' }
                    ],
                    style: { activeColor: '#dc2626' }
                },
                {
                    key: 'hoje',
                    label: 'Hoje',
                    type: 'button',
                    badge: { enabled: true, format: '{count}' },
                    conditions: [
                        { field: 'submetido', operator: 'dateGt', value: '2026-05-15', logic: 'AND' }
                    ]
                },
                {
                    key: 'esta_semana',
                    label: 'Esta Semana',
                    type: 'button',
                    badge: { enabled: true, format: '{count}' },
                    conditions: [
                        { field: 'submetido', operator: 'dateGt', value: '2026-05-13', logic: 'AND' }
                    ]
                }
            ]
        };
        
        // ─── MOTOR DE FILTRAGEM (SIMPLIFICADO) ──────────────────────────────
        
        function applyFilter(data, filterKey) {
            var filterDef = filterConfig.definitions.find(f => f.key === filterKey);
            if (!filterDef || !filterDef.conditions || filterDef.conditions[0].field === null) {
                return data;
            }
            
            return data.filter(row => {
                return filterDef.conditions.every(cond => {
                    var fieldValue = row[cond.field];
                    var filterValue = cond.value;
                    
                    switch(cond.operator) {
                        case 'eq':
                            return fieldValue == filterValue;
                        case 'dateGt':
                            return new Date(fieldValue) > new Date(filterValue);
                        default:
                            return true;
                    }
                });
            });
        }
        
        // ─── INICIALIZAÇÃO TABULATOR ─────────────────────────────────────────
        
        var table = new Tabulator("#aprovacoes-table", {
            data: dadosCompletos,
            layout: "fitColumns",
            height: "400px",
            columns: [
                {
                    title: "Tipo",
                    field: "tipo",
                    width: 120,
                    formatter: function(cell) {
                        var data = cell.getData();
                        return '<span style="font-size:20px;">' + data.tipoIcon + '</span> '
                             + '<span style="font-size:13px;color:#64748b;">' + data.colaborador + '</span>';
                    }
                },
                {
                    title: "Colaborador",
                    field: "colaborador",
                    width: 150
                },
                {
                    title: "Referência/Período",
                    field: "referencia",
                    width: 200
                },
                {
                    title: "Submetido",
                    field: "submetido",
                    width: 120,
                    formatter: function(cell) {
                        var date = new Date(cell.getValue());
                        return date.toLocaleDateString('pt-PT');
                    }
                },
                {
                    title: "Status",
                    field: "status",
                    width: 120,
                    formatter: function(cell) {
                        var status = cell.getValue();
                        var className = status === 'Urgente' ? 'urgente' : 'normal';
                        return '<span class="status-badge ' + className + '">' + status + '</span>';
                    }
                },
                {
                    title: "Ações",
                    field: "acoes",
                    width: 180,
                    formatter: function() {
                        return '<button class="action-btn success"><span class="glyphicon glyphicon-ok"></span></button> '
                             + '<button class="action-btn info"><span class="glyphicon glyphicon-ok"></span></button> '
                             + '<button class="action-btn danger"><span class="glyphicon glyphicon-remove"></span></button> '
                             + '<button class="action-btn"><span class="glyphicon glyphicon-eye-open"></span></button>';
                    }
                }
            ]
        });
        
        // ─── EVENT HANDLERS ──────────────────────────────────────────────────
        
        $('.mtbl-filter-btn').on('click', function() {
            var filterKey = $(this).data('filter');
            
            // Update UI
            $('.mtbl-filter-btn').removeClass('is-active');
            $(this).addClass('is-active');
            
            // Apply filter
            var filteredData = applyFilter(dadosCompletos, filterKey);
            table.setData(filteredData);
            
            // Update stats
            var filterDef = filterConfig.definitions.find(f => f.key === filterKey);
            $('#active-filter').text(filterDef.label);
            $('#filtered-count').text(filteredData.length);
            $('#total-count').text(dadosCompletos.length);
            
            // Update config display
            updateConfigDisplay(filterKey);
        });
        
        // Global search
        $('#global-search').on('keyup', function() {
            var searchTerm = $(this).val().toLowerCase();
            table.setFilter([
                {field:"colaborador", type:"like", value:searchTerm},
                {field:"referencia", type:"like", value:searchTerm}
            ]);
        });
        
        // ─── UTILITIES ───────────────────────────────────────────────────────
        
        function toggleConfig() {
            $('#config-json').toggle();
        }
        
        function updateConfigDisplay(filterKey) {
            var filterDef = filterConfig.definitions.find(f => f.key === filterKey);
            var configJson = JSON.stringify({
                activeFilter: filterKey,
                filterDefinition: filterDef
            }, null, 2);
            $('#config-json').text(configJson);
        }
        
        // Initial config display
        updateConfigDisplay('todos');
    </script>
</body>
</html>
