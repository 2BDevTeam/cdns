<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Boxicons</title>

    <!-- Boxicons CDN -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
        }

        .icon-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .icon-card:hover {
            background: #334155;
            transform: translateY(-5px);
        }

        .icon-card i {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .sizes i {
            margin: 10px;
        }

        .colors i {
            margin: 10px;
            font-size: 30px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: #2563eb;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .animated i {
            font-size: 30px;
            margin: 15px;
        }
    </style>
</head>
<body>

    <h1>🚀 Teste Completo Boxicons</h1>

    <!-- GRID DE ÍCONES -->
    <div class="section">
        <h2>📦 Ícones básicos</h2>
        <div class="icons-grid">
            <div class="icon-card"><i class='bx bx-home'></i><div>home</div></div>
            <div class="icon-card"><i class='bx bx-user'></i><div>user</div></div>
            <div class="icon-card"><i class='bx bx-cog'></i><div>settings</div></div>
            <div class="icon-card"><i class='bx bx-bell'></i><div>notification</div></div>
            <div class="icon-card"><i class='bx bx-envelope'></i><div>email</div></div>
            <div class="icon-card"><i class='bx bx-search'></i><div>search</div></div>
            <div class="icon-card"><i class='bx bx-cart'></i><div>cart</div></div>
            <div class="icon-card"><i class='bx bx-heart'></i><div>like</div></div>
            <div class="icon-card"><i class='bx bx-star'></i><div>star</div></div>
            <div class="icon-card"><i class='bx bx-cloud'></i><div>cloud</div></div>
        </div>
    </div>

    <!-- TAMANHOS -->
    <div class="section sizes">
        <h2>📏 Tamanhos</h2>
        <i class='bx bx-home' style="font-size:16px"></i>
        <i class='bx bx-home' style="font-size:24px"></i>
        <i class='bx bx-home' style="font-size:32px"></i>
        <i class='bx bx-home' style="font-size:48px"></i>
        <i class='bx bx-home' style="font-size:64px"></i>
    </div>

    <!-- CORES -->
    <div class="section colors">
        <h2>🎨 Cores</h2>
        <i class='bx bx-heart' style="color:red"></i>
        <i class='bx bx-heart' style="color:orange"></i>
        <i class='bx bx-heart' style="color:yellow"></i>
        <i class='bx bx-heart' style="color:green"></i>
        <i class='bx bx-heart' style="color:cyan"></i>
        <i class='bx bx-heart' style="color:blue"></i>
        <i class='bx bx-heart' style="color:purple"></i>
    </div>

    <!-- BOTÕES -->
    <div class="section">
        <h2>🔘 Botões com ícones</h2>
        <div class="buttons">
            <div class="btn"><i class='bx bx-user'></i> Perfil</div>
            <div class="btn"><i class='bx bx-log-in'></i> Login</div>
            <div class="btn"><i class='bx bx-cart'></i> Comprar</div>
            <div class="btn"><i class='bx bx-download'></i> Download</div>
        </div>
    </div>

    <!-- ANIMAÇÕES -->
    <div class="section animated">
        <h2>⚡ Animações</h2>
        <i class='bx bx-loader bx-spin'></i>
        <i class='bx bx-loader-circle bx-spin'></i>
        <i class='bx bx-bell bx-tada'></i>
        <i class='bx bx-heart bx-burst'></i>
        <i class='bx bx-rotate-right bx-spin'></i>
    </div>

    <!-- TIPOS (SOLID vs REGULAR) -->
    <div class="section">
        <h2>🔄 Estilos (Regular vs Solid)</h2>
        <i class='bx bx-heart' style="font-size:40px"></i>
        <i class='bx bxs-heart' style="font-size:40px; color:red;"></i>
    </div>

</body>
</html>
